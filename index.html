<script>
// ── PWA: Fully inline for single-file deployment ──
(function(){
  // 1. Get icon from existing apple-touch-icon (already base64 in HTML)
  const iconHref=document.querySelector('link[rel=apple-touch-icon]')?.href||'';

  // 2. Inline Web App Manifest (Android standalone mode)
  const manifest=JSON.stringify({
    name:"Goal Tracker",
    short_name:"Goal Tracker",
    start_url:"./",
    display:"standalone",
    background_color:"#0d0d10",
    theme_color:"#0d0d10",
    orientation:"portrait",
    icons:[
      {src:iconHref,sizes:"180x180",type:"image/png"},
      {src:iconHref,sizes:"512x512",type:"image/png",purpose:"any maskable"}
    ]
  });
  const mBlob=new Blob([manifest],{type:'application/json'});
  const mLink=document.createElement('link');
  mLink.rel='manifest';
  mLink.href=URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  // 3. Inline Service Worker (no separate sw.js file needed)
  if('serviceWorker' in navigator){
    const swCode=`
      self.addEventListener('install',()=>self.skipWaiting());
      self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
      self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'/'}).catch(()=>{});
  }
})();
</script>

<style>
:root {
  --bg:       #0d0d10;
  --surface:  #141417;
  --surface2: #1e1e25;
  --surface3: #26262f;
  --border:   #4a4a60;
  --border2:  #383850;
  --scrim:    rgba(0,0,0,0.72);

  --text1: #f4f4fa;
  --text2: #c8c8e0;
  --text3: #b0b0cc;

  --green:     #22c55e;
  --green-bg:  rgba(34,197,94,0.1);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,0.1);
  --amber:     #6366f1;
  --amber-bg:  rgba(99,102,241,0.1);

  --accent:    rgba(255,255,255,0.9);
  --accent2:   rgba(255,255,255,0.06);
  --blue:      #3B82F6;

  --mono: 'Inter', sans-serif;
  --nav-h: 60px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --ease: cubic-bezier(0.16,1,0.3,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="soft-dark"] {
  --bg:       #1a1a1f;
  --surface:  #222228;
  --surface2: #2a2a32;
  --surface3: #313139;
  --border:   #4c4c5c;
  --border2:  #3d3d4a;
  --scrim:    rgba(0,0,0,0.65);
  --text1: #ececf1;
  --text2: #b8b8c8;
  --text3: #888898;
}
[data-theme="soft-dark"] .top-header { background: rgba(26,26,31,0.96) }
[data-theme="soft-dark"] .tab-bar { background: rgba(26,26,31,0.97) }
[data-theme="light"] {
  --bg:       #f2f2f7;
  --surface:  #ffffff;
  --surface2: #f7f7fb;
  --surface3: #ededf3;
  --border:   #d4d4e0;
  --border2:  #e4e4ee;
  --text1:    #111120;
  --text2:    #52526e;
  --text3:    #9090aa;
  --accent2:  rgba(0,0,0,0.04);
  --scrim:    rgba(0,0,0,0.45);
  --green:     #16a34a;
  --green-bg:  rgba(22,163,74,0.08);
  --red:       #dc2626;
  --red-bg:    rgba(220,38,38,0.08);
}
[data-theme="light"] .top-header { background: rgba(242,242,247,0.97); box-shadow: none; border-bottom: 1px solid var(--border) }
[data-theme="light"] .tab-bar { background: rgba(242,242,247,0.98); border-top: 1px solid var(--border) }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html { height:100%; overflow-x:hidden; font-size:16px; background:var(--bg) }
body {
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg); color:var(--text1);
  min-height:100vh; max-width:100vw;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 4px);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body.scroll-locked {
  overflow:hidden;
  position:fixed;
  width:100%;
  touch-action:none;
  -webkit-overflow-scrolling:auto;
}
::-webkit-scrollbar { width:0; height:0 }

/* ── PAGES ── */
.page { display:none; max-width:100%; overflow-x:hidden }
.page.active { display:block; animation:pageIn 0.22s var(--ease) both }
@keyframes pageIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.container { width:100%; max-width:480px; margin:0 auto; padding:12px 14px 16px }

/* ── HEADER ── */
.top-header {
  position:sticky; top:0; z-index:80;
  background:rgba(13,13,16,0.96);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  padding:calc(env(safe-area-inset-top, 12px) + 12px) 16px 11px;
  display:flex; align-items:center; justify-content:center;
}
.hdr-inner { width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between; }
.hdr-left { display:flex; align-items:center; gap:10px }
.avatar-btn {
  width:2.2rem; height:2.2rem; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.78rem; font-weight:700; cursor:pointer; border:none; color:#fff;
  transition:transform 180ms var(--spring); flex-shrink:0;
}
.avatar-btn:active { transform:scale(0.9) }
.hdr-greeting { font-size:0.72rem; color:var(--text3); font-weight:400; line-height:1; letter-spacing:0.1px }
.hdr-name { font-size:1.18rem; font-weight:800; color:var(--text1); letter-spacing:-0.4px; line-height:1.2 }
.hdr-right { display:flex; align-items:center; gap:7px }
.hdr-add-btn{width:34px;height:34px;border-radius:50%;background:#3B82F6;border:none;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(59,130,246,.4);transition:all 120ms var(--spring);flex-shrink:0}
.hdr-add-btn:active{transform:scale(.88);opacity:.85}
.hdr-icon-btn {
  width:2rem; height:2rem; border-radius:8px;
  background:var(--surface2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:0.85rem;
}

/* ── DASHBOARD STAT GRID ── */
.stat-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding:12px 14px 0;
}
.stat-grid-3 { grid-template-columns: repeat(3,1fr) }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px 14px 13px;
  cursor:default; transition:background 120ms;
}
.stat-card.full { grid-column: 1 / -1 }
.stat-card.tap { cursor:pointer }
.stat-card.tap:active { background:var(--surface2) }
.stat-label {
  font-size:0.65rem; font-weight:600; color:var(--text3);
  letter-spacing:0.5px; margin-bottom:7px; text-transform:uppercase;
}
[data-theme="light"] .stat-label { color:#555570 }
[data-theme="light"] .inv-stat-label { color:#555570 }
[data-theme="light"] .wealth-item-label { color:#555570 }
[data-theme="light"] .goal-target { color:#555570 }
[data-theme="light"] .cf-label { color:#555570 }
.stat-val {
  font-family:var(--mono); font-size:0.62rem; font-weight:700;
  color:var(--text1); letter-spacing:0; line-height:1;
}
.stat-val.lg { font-size:1.7rem }
.stat-sub { font-size:0.84rem; color:var(--text3); margin-top:5px }
.pnl-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:99px; font-size:0.72rem; font-weight:700;
  font-family:var(--mono);
}

/* ── SECTION HEADER ── */
.sec-hdr-card {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 14px; cursor:pointer; user-select:none;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r-lg); margin-bottom:8px;
  transition:background 120ms;
}
.sec-hdr-card:active { background:var(--surface3) }
.sec-hdr-left { display:flex; align-items:center; gap:9px; min-width:0 }
.sec-hdr-title { font-size:0.86rem; font-weight:600; color:var(--text1); display:inline-flex; align-items:center; gap:8px; letter-spacing:0 }
.sec-hdr-title svg { opacity:0.45; flex-shrink:0 }
.sec-badge {
  font-size:0.68rem; font-weight:700; color:#3B82F6;
  background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2);
  padding:2px 8px; border-radius:99px; letter-spacing:0;
}
.sec-hdr-right { display:flex; align-items:center; gap:8px; flex-shrink:0 }
.sec-total { font-size:0.84rem; font-weight:700; color:var(--text1) }
.sec-caret { color:var(--text3); transition:transform 0.25s var(--ease); display:flex; align-items:center; }
.sec-caret svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
.sec-caret.open { transform:rotate(180deg) }
.sec-body { overflow:hidden; max-height:5000px; transition:max-height 0.32s var(--ease),opacity 0.2s ease; opacity:1 }
.sec-body.closed { max-height:0; opacity:0; pointer-events:none }

/* ── ROWS ── */
.row-list-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); overflow:hidden;
}
.row-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; background:transparent;
  border-bottom:1px solid var(--border2);
  cursor:pointer; transition:background 120ms;
}
.row-item:last-child { border-bottom:none }
.row-item.tap { cursor:pointer }
.row-item:active { background:var(--surface2) }
.row-icon {
  width:34px; height:34px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface2); border:1px solid var(--border); color:var(--text2);
}
.row-icon svg { width:15px; height:15px; opacity:0.85 }
.row-body { flex:1; min-width:0 }
.row-title { font-size:0.88rem; font-weight:600; color:var(--text1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.row-sub { font-size:0.72rem; color:var(--text3); margin-top:2px }
.row-change { font-size:0.73rem; font-weight:600; margin-top:2px }
.row-right { text-align:right; flex-shrink:0; display:flex; align-items:center; gap:8px }
.row-value { font-size:0.92rem; font-weight:700; color:var(--text1) }
.row-actions { display:flex; gap:4px; align-items:center }

/* ── GOAL ROW ── */
.goal-row {
  display:flex; align-items:center; gap:12px;
  padding:13px 14px; cursor:pointer; background:transparent;
  border-bottom:1px solid var(--border2);
  transition:background 120ms;
}
.goal-row:last-of-type { border-bottom:none }
.goal-row:active { background:var(--surface2) }
.goal-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--surface2); border:1px solid var(--border); color:var(--text2) }
.goal-icon svg { width:15px; height:15px; opacity:0.85 }
.goal-body { flex:1; min-width:0 }
.goal-chevron { color:var(--text3); opacity:0.9; flex-shrink:0; display:flex; align-items:center }
.goal-chevron svg { width:14px; height:14px }
.ins-type-tag { font-size:0.62rem; font-weight:700; color:var(--text3); letter-spacing:0.3px; text-transform:uppercase; margin-top:1px }
.goal-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px }
.goal-name { font-size:0.88rem; font-weight:600; color:var(--text1) }
.goal-pct { font-size:0.84rem; font-weight:800; color:#3B82F6; flex-shrink:0 }
.prog-track { height:6px; background:var(--surface3); border-radius:99px; overflow:hidden }
.prog-fill { height:100%; border-radius:99px; transition:width 0.5s var(--ease) }
.goal-amounts { display:flex; align-items:center; justify-content:space-between; margin-top:5px }
.goal-saved { font-size:0.88rem; font-weight:700; color:var(--text1) }
.goal-target { font-size:0.68rem; color:var(--text3) }

/* ── MINI GOAL ── */
.mini-goal {
  display:flex; align-items:center; gap:10px; padding:10px 13px;
  cursor:pointer; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); margin-bottom:6px; transition:background 120ms;
}
.mini-goal:active { background:var(--surface2) }
.mini-ico { font-size:0.86rem; flex-shrink:0; width:24px; text-align:center; opacity:0.85 }
.mini-body { flex:1; min-width:0 }
.mini-name { font-size:0.84rem; font-weight:600; color:var(--text1) }
.mini-prog { height:4px; background:var(--surface3); border-radius:99px; overflow:hidden; margin-top:5px }
.mini-fill { height:100%; border-radius:99px; transition:width 0.5s var(--ease) }
.mini-pct { font-family:var(--mono); font-size:0.86rem; font-weight:700; flex-shrink:0; color:var(--text1) }
[data-theme="light"] .mini-pct { color:var(--text1); font-weight:700 }

/* ── INVESTMENT CATEGORY ── */
.inv-cat-label {
  font-size:0.72rem; font-weight:700; color:var(--text3);
  letter-spacing:0;
  padding:4px 0; margin:12px 0 6px;
}

/* ── CHILD CARD ── */
.child-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); overflow:hidden; margin-bottom:8px;
}
.child-hdr {
  padding:13px 14px; display:flex; align-items:center; gap:11px;
  cursor:pointer; transition:background 120ms;
}
.child-hdr:active { background:var(--surface2) }
.child-avatar {
  width:36px; height:36px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.12); color:#3B82F6;
}
.child-avatar svg { width:16px; height:16px; opacity:0.85 }
.child-name { font-size:0.9rem; font-weight:600; color:var(--text1) }
.child-meta { font-size:0.75rem; color:var(--text3); margin-top:2px }
.phase-row {
  display:flex; align-items:center; gap:9px; padding:11px 14px;
  cursor:pointer; border-top:1px solid var(--border2); transition:background 120ms;
  position:relative;
}
.phase-row::after {
  content:'›'; font-size:1.2rem; font-weight:300; color:var(--text3); opacity:0.9;
  flex-shrink:0; margin-left:4px;
}
.phase-row:active { background:var(--surface2) }
.phase-ico { flex-shrink:0; display:flex; align-items:center; justify-content:center }
.dark .phase-ico svg { opacity:0.9 }
.phase-info { flex:1; min-width:0 }
.phase-name { font-size:0.85rem; font-weight:600; color:var(--text1) }
.phase-age { font-size:0.78rem; color:var(--text3); margin-top:1px }
.phase-prog { width:80px; flex-shrink:0 }

/* ── CHECKLIST ── */
.check-item {
  display:flex; align-items:flex-start; gap:12px; padding:11px 14px;
  cursor:pointer; background:transparent;
  border-bottom:1px solid var(--border2);
  transition:background 120ms;
}
.check-item:last-of-type { border-bottom:none }
.check-item:active { background:var(--surface2) }
.check-box {
  width:20px; height:20px; border-radius:6px; border:1.5px solid var(--text3);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  margin-top:1px; transition:all 150ms var(--spring);
}
.check-item.done .check-box { background:#3B82F6; border-color:#3B82F6 }
:root .check-item.done .check-box { background:#3B82F6; border-color:#3B82F6 }
[data-theme="light"] .check-item.done .check-box { background:#3B82F6; border-color:#3B82F6 }
.check-label { font-size:0.84rem; font-weight:600; color:var(--text1) }
.check-desc { font-size:0.75rem; color:var(--text3); margin-top:2px }
/* .check-item.done .check-label — keep full color, Done pill is enough */

/* ── DARK MODE: boost key financial values & percentages to full white ── */
:root .row-value { color:var(--text1) }
:root .row-sub { color:var(--text2) }
:root .wealth-item-val { color:var(--text1) }
:root .cf-val { color:var(--text1) }
:root .cf-label { color:var(--text2) }
:root .gh-pct { color:var(--text1) }
:root .sec-total { color:var(--text1) }
[data-theme="light"] .row-value { color:var(--text1) }
[data-theme="light"] .wealth-item-val { color:var(--text1) }

/* ── LIGHT MODE: all financial values dark & bold ── */
[data-theme="light"] .acat-val { color:var(--text1); font-weight:700 }
[data-theme="light"] .acat-pct { color:#2563EB; font-weight:700 }
[data-theme="light"] .goal-pct { color:#2563EB; font-weight:700 }
[data-theme="light"] .mini-pct { color:#2563EB; font-weight:700 }
[data-theme="light"] .sec-total { color:var(--text1); font-weight:700 }
[data-theme="light"] .row-value { color:var(--text1); font-weight:700 }
[data-theme="light"] .goal-saved { color:var(--text1); font-weight:700 }
[data-theme="light"] .inv-stat-val { color:var(--text1); font-weight:700 }
[data-theme="light"] .wealth-item-val { color:var(--text1); font-weight:700 }
[data-theme="light"] .cf-val { color:var(--text1); font-weight:700 }
[data-theme="light"] .gh-pct { color:var(--text1); font-weight:700 }
[data-theme="light"] .stat-val { color:var(--text1); font-weight:700 }
/* Light mode: secondary text clearly subordinate */
